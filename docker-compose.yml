services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ai_agency_boss
      POSTGRES_USER: ai_agency_boss
      POSTGRES_PASSWORD: ai_agency_boss_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql://ai_agency_boss:ai_agency_boss_dev@postgres:5432/ai_agency_boss
      JWT_SECRET: "super-secret-key-123"
      JWT_ALGORITHM: HS256
      JWT_EXPIRES_MINUTES: "60"
      CORS_ORIGINS: http://localhost:3000
      IMAGE_MODEL_TYPE: sdturbo
      IMAGE_MODEL_PATH: /app/storage/models/sd-turbo
      IMAGE_MODEL_ID: stabilityai/sd-turbo
      IMAGE_LOCAL_ONLY: "false"
    ports:
      - "8000:8000"
    depends_on:
      - postgres
    volumes:
      - ./storage:/app/storage

  frontend:
    build:
      context: ./frontend
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  pgdata:
